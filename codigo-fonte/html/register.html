<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="register" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <script src="register.js" defer></script>
</head>
<body>
 <form id="cadastroUser">
    <h2>CADASTRO DE USUARIOS</h2>

    <!--caixa de texto NOME--> 
    <label for="nome">Nome</label><br>
    <input type="text" id="nome" name="nome" placeholder="Digite o seu Nome..."><br>

    <!--caixa de texto E-MAIL--> 
    <label for="email">E-mail</label><br>
    <input type="text" id="email" name="email" placeholder="Digite o seu E-mail..."><br>

    <!--caixa de texto DATA DE NASCIMENTO-->
    <label for="dataN">Data de Nascimento</label><br>
    <input type="date" id="dataN" name="dataN"><br>

    <!--caixa de texto Telefone-->
    <label for="tel">Telefone</label><br>
    <input type="number" id="tel" name="tel" placeholder="Digite o seu Telefone..."><br>

    <!--CAIXA DE TEXTO SENHA--> 
    <label for="senha">Senha</label><br>
    <input type="password" id="senha" name="senha" placeholder="Crie a sua senha..."><br><br>
    
    <!--Botao cadastrar-->
    <input type="submit" value="CADASTRAR">

 </form> 
 <p id="mensagem"></p> 
 <p id="mensageMM"></p> 
</body>
</html>
